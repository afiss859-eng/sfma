openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: SFMA Community Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: members
    description: Member operations
  - name: groups
    description: Group/channel operations
  - name: messages
    description: Messaging operations
  - name: applications
    description: Recruitment applications
  - name: polls
    description: Poll operations
  - name: events
    description: Event operations
  - name: gallery
    description: Gallery operations
  - name: settings
    description: Site settings
  - name: stats
    description: Community statistics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "401":
          description: Not authenticated

  /members:
    get:
      operationId: listMembers
      tags: [members]
      summary: List all members
      responses:
        "200":
          description: Members list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Member"

  /members/{id}:
    get:
      operationId: getMember
      tags: [members]
      summary: Get member profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Member profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "404":
          description: Not found

    patch:
      operationId: updateMember
      tags: [members]
      summary: Update member (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberUpdate"
      responses:
        "200":
          description: Updated member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"

  /members/{id}/ban:
    post:
      operationId: banMember
      tags: [members]
      summary: Ban a member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Banned

  /members/{id}/avatar:
    post:
      operationId: uploadAvatar
      tags: [members]
      summary: Upload member avatar
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvatarInput"
      responses:
        "200":
          description: Avatar updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"

  /groups:
    get:
      operationId: listGroups
      tags: [groups]
      summary: List all groups
      responses:
        "200":
          description: Groups list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Group"

    post:
      operationId: createGroup
      tags: [groups]
      summary: Create a group (Lords only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupInput"
      responses:
        "201":
          description: Created group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"

  /groups/{id}:
    get:
      operationId: getGroup
      tags: [groups]
      summary: Get group details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"

    patch:
      operationId: updateGroup
      tags: [groups]
      summary: Update group (Lords only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupUpdate"
      responses:
        "200":
          description: Updated group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"

    delete:
      operationId: deleteGroup
      tags: [groups]
      summary: Delete group (Lords only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted

  /groups/{id}/messages:
    get:
      operationId: getGroupMessages
      tags: [messages]
      summary: Get messages in a group
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"

    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message to a group
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /messages/{id}:
    delete:
      operationId: deleteMessage
      tags: [messages]
      summary: Delete a message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted

  /messages/{id}/reactions:
    post:
      operationId: addReaction
      tags: [messages]
      summary: Add/toggle emoji reaction to a message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReactionInput"
      responses:
        "200":
          description: Reaction toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /applications:
    get:
      operationId: listApplications
      tags: [applications]
      summary: List applications (Lords only)
      responses:
        "200":
          description: Applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Application"

    post:
      operationId: submitApplication
      tags: [applications]
      summary: Submit a recruitment application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationInput"
      responses:
        "201":
          description: Application submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /applications/{id}/accept:
    post:
      operationId: acceptApplication
      tags: [applications]
      summary: Accept an application (Lords only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /applications/{id}/reject:
    post:
      operationId: rejectApplication
      tags: [applications]
      summary: Reject an application (Lords only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /polls:
    get:
      operationId: listPolls
      tags: [polls]
      summary: List all polls
      responses:
        "200":
          description: Polls
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Poll"

    post:
      operationId: createPoll
      tags: [polls]
      summary: Create a poll (Lords only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PollInput"
      responses:
        "201":
          description: Poll created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Poll"

  /polls/{id}/vote:
    post:
      operationId: votePoll
      tags: [polls]
      summary: Vote on a poll
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoteInput"
      responses:
        "200":
          description: Vote recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Poll"

  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List community events
      responses:
        "200":
          description: Events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"

    post:
      operationId: createEvent
      tags: [events]
      summary: Create event (Lords only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "201":
          description: Event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /events/{id}/rsvp:
    post:
      operationId: rsvpEvent
      tags: [events]
      summary: RSVP to an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: RSVP toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /gallery:
    get:
      operationId: listGallery
      tags: [gallery]
      summary: List approved gallery photos
      responses:
        "200":
          description: Gallery photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GalleryPhoto"

    post:
      operationId: submitPhoto
      tags: [gallery]
      summary: Submit a photo for approval
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhotoInput"
      responses:
        "201":
          description: Photo submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GalleryPhoto"

  /gallery/{id}/approve:
    post:
      operationId: approvePhoto
      tags: [gallery]
      summary: Approve a gallery photo (Lords only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GalleryPhoto"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get site settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettings"

    patch:
      operationId: updateSettings
      tags: [settings]
      summary: Update site settings (Lords only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteSettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettings"

  /stats:
    get:
      operationId: getCommunityStats
      tags: [stats]
      summary: Get community statistics
      responses:
        "200":
          description: Community stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityStats"

  /audit-log:
    get:
      operationId: getAuditLog
      tags: [settings]
      summary: Get action audit log (Lords only)
      responses:
        "200":
          description: Audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditEntry"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    LoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    AuthResult:
      type: object
      required: [member, token]
      properties:
        member:
          $ref: "#/components/schemas/Member"
        token:
          type: string

    Member:
      type: object
      required: [id, username, grade, memberId, joinedAt, reputation]
      properties:
        id:
          type: string
        username:
          type: string
        grade:
          type: string
          enum: [Fondateur_Suprême, Co-Fondateur, Lord, Administrateur, Recruteur, Modérateur, Membre_Élite, Membre, Nouveau_Membre]
        gradeEmoji:
          type: string
        memberId:
          type: string
        country:
          type: ["string", "null"]
        whatsapp:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        reputation:
          type: integer
        joinedAt:
          type: string
        isBanned:
          type: boolean
        badges:
          type: array
          items:
            type: string

    MemberUpdate:
      type: object
      properties:
        grade:
          type: string
        bio:
          type: string
        country:
          type: string

    AvatarInput:
      type: object
      required: [avatarUrl]
      properties:
        avatarUrl:
          type: string

    Group:
      type: object
      required: [id, name, emoji, description, writePermission, order]
      properties:
        id:
          type: string
        name:
          type: string
        emoji:
          type: string
        description:
          type: string
        writePermission:
          type: string
          enum: [all, lords_only]
        order:
          type: integer
        memberCount:
          type: integer
        lastMessageAt:
          type: ["string", "null"]

    GroupInput:
      type: object
      required: [name, emoji, description, writePermission]
      properties:
        name:
          type: string
        emoji:
          type: string
        description:
          type: string
        writePermission:
          type: string
          enum: [all, lords_only]
        order:
          type: integer

    GroupUpdate:
      type: object
      properties:
        name:
          type: string
        emoji:
          type: string
        description:
          type: string
        writePermission:
          type: string
          enum: [all, lords_only]
        order:
          type: integer

    Message:
      type: object
      required: [id, groupId, content, author, createdAt]
      properties:
        id:
          type: string
        groupId:
          type: string
        content:
          type: string
        author:
          $ref: "#/components/schemas/Member"
        replyTo:
          type: ["object", "null"]
          properties:
            id:
              type: string
            content:
              type: string
            authorUsername:
              type: string
        reactions:
          type: array
          items:
            $ref: "#/components/schemas/Reaction"
        createdAt:
          type: string
        mentions:
          type: array
          items:
            type: string

    MessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
        replyToId:
          type: ["string", "null"]
        mentions:
          type: array
          items:
            type: string

    Reaction:
      type: object
      required: [emoji, count, userIds]
      properties:
        emoji:
          type: string
        count:
          type: integer
        userIds:
          type: array
          items:
            type: string

    ReactionInput:
      type: object
      required: [emoji]
      properties:
        emoji:
          type: string

    Application:
      type: object
      required: [id, pseudo, age, country, whatsapp, reason, status, submittedAt]
      properties:
        id:
          type: string
        pseudo:
          type: string
        age:
          type: integer
        country:
          type: string
        whatsapp:
          type: string
        previousClan:
          type: ["string", "null"]
        previousClanLeaveReason:
          type: ["string", "null"]
        availability:
          type: string
        reason:
          type: string
        valueContribution:
          type: string
        respectAnswer:
          type: string
        conflictAnswer:
          type: string
        status:
          type: string
          enum: [pending, accepted, rejected]
        submittedAt:
          type: string
        reviewedAt:
          type: ["string", "null"]
        reviewedBy:
          type: ["string", "null"]

    ApplicationInput:
      type: object
      required: [pseudo, age, country, whatsapp, availability, reason, valueContribution, respectAnswer, conflictAnswer, desiredPassword]
      properties:
        pseudo:
          type: string
        age:
          type: integer
        country:
          type: string
        whatsapp:
          type: string
        previousClan:
          type: string
        previousClanLeaveReason:
          type: string
        availability:
          type: string
        reason:
          type: string
        valueContribution:
          type: string
        respectAnswer:
          type: string
        conflictAnswer:
          type: string
        desiredPassword:
          type: string

    Poll:
      type: object
      required: [id, question, options, createdAt, createdBy]
      properties:
        id:
          type: string
        question:
          type: string
        options:
          type: array
          items:
            $ref: "#/components/schemas/PollOption"
        createdAt:
          type: string
        createdBy:
          type: string
        closedAt:
          type: ["string", "null"]
        totalVotes:
          type: integer
        userVotedOption:
          type: ["string", "null"]

    PollOption:
      type: object
      required: [id, text, votes]
      properties:
        id:
          type: string
        text:
          type: string
        votes:
          type: integer
        percentage:
          type: number

    PollInput:
      type: object
      required: [question, options]
      properties:
        question:
          type: string
        options:
          type: array
          items:
            type: string

    VoteInput:
      type: object
      required: [optionId]
      properties:
        optionId:
          type: string

    Event:
      type: object
      required: [id, title, description, eventDate, createdBy, participantCount]
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        location:
          type: ["string", "null"]
        eventDate:
          type: string
        createdBy:
          type: string
        participantCount:
          type: integer
        isParticipating:
          type: boolean
        participants:
          type: array
          items:
            type: string

    EventInput:
      type: object
      required: [title, description, eventDate]
      properties:
        title:
          type: string
        description:
          type: string
        location:
          type: string
        eventDate:
          type: string

    GalleryPhoto:
      type: object
      required: [id, url, submittedBy, status, submittedAt]
      properties:
        id:
          type: string
        url:
          type: string
        caption:
          type: ["string", "null"]
        submittedBy:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        submittedAt:
          type: string
        approvedAt:
          type: ["string", "null"]

    PhotoInput:
      type: object
      required: [url]
      properties:
        url:
          type: string
        caption:
          type: string

    SiteSettings:
      type: object
      required: [siteName, slogan, description, primaryColor, accentColor, backgroundColor]
      properties:
        siteName:
          type: string
        slogan:
          type: string
        description:
          type: string
        logoUrl:
          type: ["string", "null"]
        backgroundImageUrl:
          type: ["string", "null"]
        primaryColor:
          type: string
        accentColor:
          type: string
        backgroundColor:
          type: string
        fontFamily:
          type: string
        whatsappGroupLink:
          type: ["string", "null"]
        whatsappGroupPhoto:
          type: ["string", "null"]

    SiteSettingsUpdate:
      type: object
      properties:
        siteName:
          type: string
        slogan:
          type: string
        description:
          type: string
        logoUrl:
          type: string
        backgroundImageUrl:
          type: string
        primaryColor:
          type: string
        accentColor:
          type: string
        backgroundColor:
          type: string
        fontFamily:
          type: string
        whatsappGroupLink:
          type: string
        whatsappGroupPhoto:
          type: string

    CommunityStats:
      type: object
      required: [totalMembers, activeMembers, totalMessages, totalEvents, gradeDistribution, recentJoins]
      properties:
        totalMembers:
          type: integer
        activeMembers:
          type: integer
        totalMessages:
          type: integer
        totalEvents:
          type: integer
        pendingApplications:
          type: integer
        gradeDistribution:
          type: array
          items:
            type: object
            required: [grade, count]
            properties:
              grade:
                type: string
              count:
                type: integer
        recentJoins:
          type: array
          items:
            $ref: "#/components/schemas/Member"

    AuditEntry:
      type: object
      required: [id, actorUsername, action, targetType, timestamp]
      properties:
        id:
          type: string
        actorUsername:
          type: string
        action:
          type: string
        targetType:
          type: string
        targetId:
          type: ["string", "null"]
        targetName:
          type: ["string", "null"]
        details:
          type: ["string", "null"]
        timestamp:
          type: string
